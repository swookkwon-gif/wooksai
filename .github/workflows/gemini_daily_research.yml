name: Gemini Daily Deep Research

on:
  schedule:
    # 매일 UTC 20:00 (한국시간 오전 5:00) 구동
    - cron: '0 20 * * *'
  workflow_dispatch: # 수동 실행 활성화

permissions:
  contents: write # Git 커밋 및 푸시 권한

jobs:
  research-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai python-dotenv requests

      - name: Run Deep Research Auto Blogger (Gemini API)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/gf2_auto_blogger.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 새 마크다운 파일 스테이징
          git add content/posts/2.\ AI\ News/*.md || echo "No files to add"
          
          if git diff --staged --quiet; then
            echo "No new deep research posts to commit."
          else
            git commit -m "auto: Gemini deep research post generated"
            git pull --rebase origin main
            git push
          fi

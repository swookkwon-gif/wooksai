name: NotebookLM Daily Deep Research

on:
  schedule:
    # 매일 UTC 20:00 (한국시간 오전 5:00) 구동
    - cron: '0 20 * * *'
  workflow_dispatch: # 수동 실행 활성화

permissions:
  contents: write # Git 커밋 및 푸시 권한

jobs:
  research-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv (Python Package Installer)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Install notebooklm-mcp-cli
        run: |
          uv tool install notebooklm-mcp-cli
          # 경로 추가 (uv tool bin 디렉토리)
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Auth NotebookLM via Github Secrets Cookies
        env:
          NLM_COOKIES: ${{ secrets.NLM_AUTH_COOKIES }}
        run: |
          if [ -z "$NLM_COOKIES" ]; then
            echo "Error: NLM_AUTH_COOKIES secret is not set!"
            exit 1
          fi
          # 쿠키 파일 임시 저장
          echo "$NLM_COOKIES" > temp_cookies.txt
          # nlm 명령어로 매뉴얼 로그인 (쿠키 이식)
          nlm login --manual --file temp_cookies.txt
          # 보안을 위해 즉시 임시 쿠키 파일 삭제
          rm temp_cookies.txt

      - name: Run Deep Research Auto Blogger
        run: python scripts/nlm_auto_blogger.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 새 마크다운 파일 스테이징
          git add content/posts/2.\ AI\ News/*.md || echo "No files to add"
          
          if git diff --staged --quiet; then
            echo "No new deep research posts to commit."
          else
            git commit -m "auto: NotebookLM deep research post generated"
            git pull --rebase origin main
            git push
          fi

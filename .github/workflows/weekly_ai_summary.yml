name: Weekly AI Summary

on:
  schedule:
    # 매주 토요일 한국 오전 8:00 (UTC 기준 금요일 23:00)
    - cron: '0 23 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-weekly-summary:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 주간 요약은 지난 7일간의 파일이 필요하여 전체 히스토리를 긁어옵니다.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Run Weekly Summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/weekly_ai_summary.py
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 에러 방지: 생성된 파일이 없을 경우 git add가 실패하지 않도록 처리
          git add content/posts/2.\ AI\ News/*weekly-ai-review.md || echo "No weekly review files to stage."
          
          if git diff --staged --quiet; then
            echo "No new weekly summary to commit."
          else
            git commit -m "auto: weekly AI review blog post"
            git pull --rebase origin main
            git push
          fi

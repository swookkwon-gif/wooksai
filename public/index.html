<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=/wooksai/ko" />
    <title>Wook's AI and Marketing</title>
  </head>
  <body>
    <script>
      // redirect based on browser language optionally, or just default to ko
      const lang = navigator.language || navigator.userLanguage;
      if (lang.startsWith('en')) {
        window.location.replace('/wooksai/en');
      } else {
        window.location.replace('/wooksai/ko');
      }
    </script>
  </body>
</html>
